<!DOCTYPE html>
<html>
<head>
    <title>Camp Fundraiser - Apple Pay</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f7;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .price {
            font-size: 36px;
            font-weight: bold;
            color: #1c1c1e;
            margin: 20px 0;
        }
        /* Стиль кнопки Apple Pay */
        .apple-pay-button {
            -webkit-appearance: -apple-pay-button;
            -apple-pay-button-type: buy;
            -apple-pay-button-style: black;
            width: 100%;
            height: 44px;
            cursor: pointer;
            margin: 20px 0;
        }
        .info {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 20px;
        }
        /* Стиль для сообщения спасибо */
        .thankyou-message {
            background: #34c759;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-weight: bold;
            font-size: 18px;
            display: none;
        }
        /* Скрываем кнопку после оплаты */
        .hidden {
            display: none;
        }
    </style>
    <!-- Подключаем Apple Pay JS SDK -->
    <script crossorigin src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js"></script>
</head>
<body>
    <div class="card">
        <h1>🏕️ Camp Fundraiser</h1>
        <div class="price">$0.00 USD</div>
        
        <div id="apple-pay-container"></div>
        
        <div id="thankyou-message" class="thankyou-message">
            🎉 Thank you for your purchase! 🎉
        </div>
        
        <div class="info">
            Pay with Apple Pay — fast & secure
        </div>
    </div>

    <script>
        // Проверяем, поддерживается ли Apple Pay
        function checkApplePay() {
            if (window.ApplePaySession && ApplePaySession.canMakePayments()) {
                // Показываем кнопку
                const container = document.getElementById('apple-pay-container');
                const button = document.createElement('button');
                button.className = 'apple-pay-button';
                button.id = 'apple-pay-btn';
                button.onclick = startApplePay;
                container.appendChild(button);
            } else {
                // Если Apple Pay недоступен, показываем сообщение
                document.getElementById('apple-pay-container').innerHTML = 
                    '<p style="color: #8e8e93;">Apple Pay is not available on this device</p>';
            }
        }

        // Показать сообщение "Thank you"
        function showThankYou() {
            const thankYouDiv = document.getElementById('thankyou-message');
            const applePayBtn = document.getElementById('apple-pay-btn');
            
            // Показываем сообщение
            thankYouDiv.style.display = 'block';
            
            // Прячем кнопку Apple Pay
            if (applePayBtn) {
                applePayBtn.style.display = 'none';
            }
            
            // Через 5 секунд скрываем сообщение и показываем кнопку снова (для демо)
            setTimeout(() => {
                thankYouDiv.style.display = 'none';
                if (applePayBtn) {
                    applePayBtn.style.display = 'block';
                }
            }, 5000);
        }

        // Запускаем оплату
        function startApplePay() {
            // Создаем платежный запрос — США, доллары, цена 0
            const paymentRequest = {
                countryCode: 'US',           // США
                currencyCode: 'USD',         // Доллары США
                supportedNetworks: ['visa', 'mastercard', 'amex', 'discover'],
                merchantCapabilities: ['supports3DS'],
                total: {
                    label: 'Camp Fundraiser',
                    amount: '0.00',          // Цена 0 долларов!
                    type: 'final'
                }
            };

            const session = new ApplePaySession(6, paymentRequest);

            // Шаг 1: Подтверждение продавца
            session.onvalidatemerchant = async (event) => {
                try {
                    console.log('Validation URL:', event.validationURL);
                    
                    // Это демо-версия, показываем сообщение
                    alert('This is a demo version of Apple Pay.\n\nFor real payments, you need to connect a payment processor (Stripe, Gr4vy, etc.)');
                    session.abort();
                } catch (error) {
                    console.error('Validation error:', error);
                    session.abort();
                }
            };

            // Шаг 2: Обработка авторизованного платежа
            session.onpaymentauthorized = (event) => {
                console.log('Payment authorized:', event.payment);
                // Завершаем платеж успешно
                session.completePayment(ApplePaySession.STATUS_SUCCESS);
                // Показываем надпись "Thank you!"
                showThankYou();
            };

            // Шаг 3: Обработка отмены
            session.oncancel = () => {
                console.log('Payment cancelled');
            };

            // Запускаем сессию Apple Pay
            session.begin();
        }

        // Запускаем проверку при загрузке страницы
        checkApplePay();
    </script>
</body>
</html>
